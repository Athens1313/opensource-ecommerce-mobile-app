name: Compile Bagisto APK

on:
  workflow_dispatch: # Allows you to manually click a button to build the app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fetch Bagisto Dependencies
        run: flutter pub get

      - name: Compile Release APK
        run: flutter build apk --release

      - name: Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bagisto-Android-App
          path: build/app/outputs/flutter-apk/app-release.apk
